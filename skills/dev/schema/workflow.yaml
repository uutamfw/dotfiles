# Dev Workflow Schema
# This file defines the structure and status values for dev-workflow.yaml

# Location: docs/{branch_name}/dev-workflow.yaml

schema:
  plan:
    status:
      - Ready        # 計画作成可能
      - In progress  # 計画作成中
      - Done         # 計画完了、stepファイル分割済み

  execute:
    status:
      - Pending      # 計画完了待ち
      - In progress  # 実装中
      - Done         # 全step完了
    current_step: 1  # 現在のstep番号 (1-indexed)
    total_steps: 0   # 総step数

# Example:
# ```yaml
# plan:
#   status: Done
# execute:
#   status: In progress
#   current_step: 3
#   total_steps: 9
# ```
